name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Publish only the public static files — keep package.json, content/,
      # .github/, .git, and backups out of the deployed site.
      - name: Assemble static site
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r css js images dist/

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Create the Pages project on first run; ignore "already exists".
          npx --yes wrangler@4 pages project create bassamanouti \
            --production-branch=main 2>/dev/null || true
          npx --yes wrangler@4 pages deploy dist \
            --project-name=bassamanouti --branch=main
